name: Build bergamot wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build_windows:
    name: Build wheel on Windows (Python ${{ matrix.python-version }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install requests pyyaml appdirs cmake ninja

      - name: Install dependencies (pcre2 via vcpkg)
        run: |
          C:\vcpkg\vcpkg install pcre2:x64-windows-static
          echo "CMAKE_PREFIX_PATH=C:\vcpkg\installed\x64-windows-static" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Patch shortlist.cpp for split vocab support (Mozilla fix)
        run: |
          $file = "3rd_party/marian-dev/src/data/shortlist.cpp"
          $content = Get-Content $file -Raw
          
          # Fix 1: Add data_.resize in constructor
          $content = $content.Replace(
            "  prune(threshold);`n`n  if(!dumpPath.empty())",
            "  prune(threshold);`n`n  // Ensure that the data_ has enough entries for the src vocab.`n  data_.resize(srcVocab_->size());`n`n  if(!dumpPath.empty())"
          )
          
          # Fix 2: Fix generate() for split vocabs
          $oldGen = "  // add aligned target words`n  for(auto i : srcSet) {`n    if(shared_)`n      indexSet.insert(i);`n    for(auto& it : data_[i])`n      indexSet.insert(it.first);`n  }"
          $newGen = "  // Add the aligned target words from the source, and add the original source tokens`n  // as well if the vocab is shared.`n  for(auto srcIndex : srcSet) {`n    if(shared_) {`n      indexSet.insert(srcIndex);`n    }`n    // Add all of the target probabilities.`n    for(auto& it : data_.at(srcIndex)) {`n      indexSet.insert(it.first);`n    }`n  }"
          $content = $content.Replace($oldGen, $newGen)
          
          Set-Content $file $content
          # Verify the patch was applied
          $patched = Get-Content $file -Raw
          if ($patched.Contains("data_.resize(srcVocab_->size())")) {
            Write-Host "SUCCESS: shortlist.cpp patched with Mozilla fix (data_.resize found)"
          } else {
            Write-Host "FAILURE: Patch was NOT applied!"
            exit 1
          }
          if ($patched.Contains("data_.at(srcIndex)")) {
            Write-Host "SUCCESS: generate() patched (data_.at found)"
          } else {
            Write-Host "FAILURE: generate() patch was NOT applied!"
            exit 1
          }

      - name: Build wheel (CMake compiles .pyd + pip packages)
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 2
          CMAKE_ARGS: "-DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DSSPLIT_USE_INTERNAL_PCRE2=OFF"
        run: |
          python -m pip wheel --no-build-isolation --no-deps -w wheelhouse .

      - name: Inject compiled .pyd into wheel
        run: |
          python .github/scripts/inject_pyd.py

      - name: Verify wheel contains .pyd
        run: |
          python -c "import zipfile; import glob; z = zipfile.ZipFile(glob.glob('wheelhouse/*.whl')[0]); [print(n, z.getinfo(n).file_size, 'bytes') for n in z.namelist()]"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: bergamot-wheel-cp${{ matrix.python-version }}-windows
          path: wheelhouse/*.whl

  create_release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded files
        run: |
          Get-ChildItem -Recurse
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            bergamot-wheel-cp3.10-windows/*.whl
          generate_release_notes: true
