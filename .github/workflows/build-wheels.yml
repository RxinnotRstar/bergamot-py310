name: Build bergamot wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build_windows:
    name: Build wheel on Windows (Python ${{ matrix.python-version }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install requests pyyaml appdirs cmake ninja

      - name: Build wheel (no build isolation)
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: 2
          CMAKE_ARGS: "-DUSE_SENTENCEPIECE=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
        run: |
          python -m pip wheel --no-build-isolation --no-deps -w wheelhouse .

      - name: Verify wheel
        run: |
          Get-ChildItem wheelhouse/*.whl | ForEach-Object { Write-Host "Built: $($_.Name) ($($_.Length) bytes)" }

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: bergamot-wheel-cp${{ matrix.python-version }}-windows
          path: wheelhouse/*.whl

  create_release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bergamot-wheel-cp3.10-windows/*.whl
          generate_release_notes: true
