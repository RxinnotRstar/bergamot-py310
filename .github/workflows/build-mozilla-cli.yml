name: Build Mozilla translator-cli

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build_cli:
    name: Build translator-cli (Windows)
    runs-on: windows-2022

    steps:
      - name: Checkout mozilla/translations
        uses: actions/checkout@v4
        with:
          repository: mozilla/translations
          path: translations
          fetch-depth: 1

      - name: Install vcpkg dependencies
        run: |
          C:\vcpkg\vcpkg install pcre2:x64-windows-static

      - name: Configure CMake (inference/) with MSVC
        env:
          CMAKE_PREFIX_PATH: C:\vcpkg\installed\x64-windows-static
        working-directory: translations/inference
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 `
            -DCMAKE_PREFIX_PATH="$env:CMAKE_PREFIX_PATH" `
            -DCOMPILE_TESTS=OFF `
            -DCOMPILE_PYTHON=OFF `
            -DCOMPILE_WASM=OFF `
            -DUSE_WASM_COMPATIBLE_SOURCE=OFF `
            -DUSE_STATIC_LIBS=ON `
            -DUSE_MKL=OFF `
            -DUSE_INTGEMM=ON `
            -DUSE_FBGEMM=OFF `
            -DUSE_SENTENCEPIECE=ON

      - name: Build all executables
        working-directory: translations/inference
        run: |
          cmake --build build --config Release --target translator-cli --target marian_decoder --target marian_conv -j 2

      - name: Locate and prepare executables
        working-directory: translations/inference
        run: |
          New-Item -ItemType Directory exes -Force | Out-Null
          Get-ChildItem -Recurse build/ -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Found: $($_.FullName) ($($_.Length) bytes)"
            Copy-Item $_.FullName "exes/$($_.Name)"
          }
          Get-ChildItem exes/ | Select Name, Length

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: mozilla-translation-exes
          path: translations/inference/exes/*.exe
